<script>
        // Micro-interactions for buttons and inputs
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-[0.98]');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-[0.98]');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-[0.98]');
            });
        });

        // Input active states managed by CSS but can be enhanced here
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('z-10');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('z-10');
            });
        });
    </script>
