# Studio Gallery — Supabase local config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "studio-gallery"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "100MiB"

[auth]
enabled = true
site_url = "https://studio-galleries.com"
additional_redirect_urls = [
  "https://studio-galleries.com/**",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
